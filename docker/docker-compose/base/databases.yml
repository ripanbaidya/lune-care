# base — database services
# 6x PostgreSQL + 2x MongoDB
# No ports exposed here — dev overlay opens them, prod keeps them internal.
# K8s note: each DB becomes its own StatefulSet + PersistentVolumeClaim.

name: lunecare

services:

  # PostgreSQL — Auth Service  (maps to localhost:5433 in dev)
  auth-db:
    image: postgres:16-alpine
    container_name: lunecare-auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_auth_data:/var/lib/postgresql/data
    networks:
      - lunecare_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # PostgreSQL — Patient Service  (maps to localhost:5434 in dev)
  patient-db:
    image: postgres:16-alpine
    container_name: lunecare-patient-db
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_patient_data:/var/lib/postgresql/data
    networks:
      - lunecare_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d patient_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # PostgreSQL — Doctor Service  (maps to localhost:5435 in dev)
  doctor-db:
    image: postgres:16-alpine
    container_name: lunecare-doctor-db
    environment:
      POSTGRES_DB: doctor_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_doctor_data:/var/lib/postgresql/data
    networks:
      - lunecare_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d doctor_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # PostgreSQL — Appointment Service  (maps to localhost:5436 in dev)
  appointment-db:
    image: postgres:16-alpine
    container_name: lunecare-appointment-db
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_appointment_data:/var/lib/postgresql/data
    networks:
      - lunecare_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d appointment_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # PostgreSQL — Payment Service  (maps to localhost:5437 in dev)
  payment-db:
    image: postgres:16-alpine
    container_name: lunecare-payment-db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_payment_data:/var/lib/postgresql/data
    networks:
      - lunecare_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # MongoDB — Notification Service  (maps to localhost:27018 in dev)
  notification-db:
    image: mongo:8.2
    container_name: lunecare-notification-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-mongouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongopass}
      MONGO_INITDB_DATABASE: notification_db
    volumes:
      - notification_data:/data/db
    networks:
      - lunecare_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # MongoDB — Feedback Service  (maps to localhost:27019 in dev)
  feedback-db:
    image: mongo:8.2
    container_name: lunecare-feedback-db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-mongouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongopass}
      MONGO_INITDB_DATABASE: feedback_db
    volumes:
      - feedback_data:/data/db
    networks:
      - lunecare_network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  lunecare_network:
    name: lunecare_network
    driver: bridge

volumes:
  pg_auth_data:
    name: lunecare_pg_auth_data
  pg_patient_data:
    name: lunecare_pg_patient_data
  pg_doctor_data:
    name: lunecare_pg_doctor_data
  pg_appointment_data:
    name: lunecare_pg_appointment_data
  pg_payment_data:
    name: lunecare_pg_payment_data
  notification_data:
    name: lunecare_notification_data
  feedback_data:
    name: lunecare_feedback_data