      retries: 5
      start_period: 60s

  appointment-service:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/${APP_NAME:-lunecare}-appointment:${IMAGE_TAG:-latest}
    container_name: lunecare-appointment
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_CONFIG_IMPORT: optional:configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE:-http://eureka-server:8761/eureka}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
