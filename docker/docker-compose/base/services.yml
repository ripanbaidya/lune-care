  # ---------------------------------------------------------------------------
  # TIER 4 — API Gateway
  # Last to start — needs services registered in Eureka for routing rules.
  # Only service with an externally exposed port (defined in dev/prod overlays).
  # ---------------------------------------------------------------------------
  api-gateway:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/${APP_NAME:-lunecare}-api-gateway:${IMAGE_TAG:-latest}
    container_name: lunecare-api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SPRING_CONFIG_IMPORT: optional:configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
      SPRING_RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_DEFAULT_ZONE:-http://eureka-server:8761/eureka}
      # Gateway reads Redis directly — not via config-server for connection bootstrap
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - lunecare_network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q '\"status\":\"UP\"'"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 70s

networks:
  lunecare_network:
    name: lunecare_network
    driver: bridge
