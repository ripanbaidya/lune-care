# DEV ENTRYPOINT
# Do not run this file directly with `docker compose up`.
# Use the Makefile targets instead:
#   make dev-up        → start everything
#   make dev-infra     → start infra + DBs only (run services locally via IDE)
#   make dev-down      → stop and remove containers
#
# Manual equivalent:
#   docker compose \
#     -f ../base/infra.yml \
#     -f ../base/databases.yml \
#     -f ../base/services.yml \
#     -f infra.override.yml \
#     -f databases.override.yml \
#     -f services.override.yml \
#     --env-file ../../.env.dev \
#     up -d

# This file intentionally left as documentation.
# All orchestration is handled via the Makefile.
