# Load order
# infra → databases → config-server → eureka → services → api-gateway

# To enable OpenTelemetry tracing on a service, add:
#   extends:
#     file: commons.yaml
#     service: open_telemetry_environment_config

services:

  # CENTRALIZED CONFIGURATION (Bootstrap Root)
  # ConfigServer - must start first; all services pull their config from here
  config-server:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/lunecare-config-server:${IMAGE_TAG:-latest}
    container_name: lunecare-config-server
    ports:
      - "8888:8888" # Exposed port for centralized properties serving
    environment:
      SPRING_APPLICATION_NAME: config-server
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      # Remote Git repository housing localized environmental property profiles
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: ${GIT_URI:-https://github.com/ripanbaidya/lunecare-config.git}
      ENCRYPT_KEY: ${ENCRYPT_KEY} # Symmetric key used to decode structural {cipher} tags
    networks:
      - lunecare_network
    healthcheck:
      # Actuator endpoint validation ensures configuration parser is ready before exposing to microservices
      test: [ "CMD-SHELL", "curl -sf http://localhost:8888/actuator/health/readiness | grep -q UP || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  # SERVICE REGISTRY & DISCOVERY
  # EurekaServer — service registry
  eureka-server:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/lunecare-eureka-server:${IMAGE_TAG:-latest}
    container_name: lunecare-eureka-server
    ports:
      - "8761:8761" # Eureka Dashboard and registration endpoint
    environment:
      SPRING_APPLICATION_NAME: eureka-server
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      # Fetches its own registry coordination metadata from the upstream config server
      SPRING_CONFIG_IMPORT: configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - lunecare_network
    healthcheck:
      # Blocks subsequent services until service heartbeat ledger is active
      test: [ "CMD-SHELL", "curl -sf http://localhost:8761/actuator/health/readiness | grep -q UP || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # CORE/DOMAIN APPLICATION MICROSERVICES

  # AuthService (8081)
  # DB - PostgreSQL (schema: auth) + Redis (token blacklist)
  # Requires RSA private + public key mounts for JWT signing
  auth:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/lunecare-auth:${IMAGE_TAG:-latest}
    container_name: lunecare-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_APPLICATION_NAME: auth
      SPRING_PROFILES_ACTIVE:  ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_CONFIG_IMPORT: configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
    volumes:
      # Read-only mount supplying cryptographic RSA pairs required to issue secure tokens
      - ../../../secrets/keys:/app/secrets/keys:ro
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lunecare_network

  # PatientService (8082)
  # DB: PostgreSQL (schema: patient)
  patient:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/lunecare-patient:${IMAGE_TAG:-latest}
    container_name: lunecare-patient
    ports:
      - "8082:8082"
    environment:
      SPRING_APPLICATION_NAME: patient
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_CONFIG_IMPORT: configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lunecare_network

  # DoctorService (8083)
  # DB - PostgreSQL (schema: doctor)
  doctor:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/lunecare-doctor:${IMAGE_TAG:-latest}
    container_name: lunecare-doctor
    ports:
      - "8083:8083"
    environment:
      SPRING_APPLICATION_NAME: doctor
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_CONFIG_IMPORT: configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lunecare_network

  # AppointmentService (8084)
  # DB - PostgreSQL (schema: appointment) + Redis (cache)
  appointment:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/lunecare-appointment:${IMAGE_TAG:-latest}
    container_name: lunecare-appointment
    ports:
      - "8084:8084"
    environment:
      SPRING_APPLICATION_NAME: appointment
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_CONFIG_IMPORT: configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lunecare_network

  # PaymentService (8085)
  # DB: PostgreSQL (schema: payment)
  payment:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/lunecare-payment:${IMAGE_TAG:-latest}
    container_name: lunecare-payment
    ports:
      - "8085:8085"
    environment:
      SPRING_APPLICATION_NAME: payment
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_CONFIG_IMPORT: configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lunecare_network

  # NotificationService (8086)
  # DB - MongoDB (notification_db)
  notification:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/lunecare-notification:${IMAGE_TAG:-latest}
    container_name: lunecare-notification
    ports:
      - "8086:8086"
    environment:
      SPRING_APPLICATION_NAME: notification
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_CONFIG_IMPORT: configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lunecare_network

  # FeedbackService (8087)
  # DB: MongoDB (feedback_db)
  feedback:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/lunecare-feedback:${IMAGE_TAG:-latest}
    container_name: lunecare-feedback
    ports:
      - "8087:8087"
    environment:
      SPRING_APPLICATION_NAME: feedback
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_CONFIG_IMPORT: configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lunecare_network

  # AdminService (8088)
  # No dedicated DB; aggregates via Feign (doctor-service, auth-service)
  admin:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/lunecare-admin:${IMAGE_TAG:-latest}
    container_name: lunecare-admin
    ports:
      - "8088:8088"
    environment:
      SPRING_APPLICATION_NAME: admin
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_CONFIG_IMPORT: configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lunecare_network

  # EDGE ROUTING & GATEWAY OVERLAY

  # API Gateway (8080)
  # Entry point for all external traffic.
  # Requires RSA private key & public key mount for JWT verification.
  # Start last — after all domain services are registered in Eureka.
  api-gateway:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/lunecare-api-gateway:${IMAGE_TAG:-latest}
    container_name: lunecare-api-gateway
    ports:
      - "8080:8080" # Consolidated single public endpoint for front-end proxying
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_CONFIG_IMPORT: configserver:${CONFIG_SERVER_URL:-http://config-server:8888}
    volumes:
      # Public keys mounted safely to decode and verify JWT signatures stateless at the edge
      - ../../../secrets/keys:/app/secrets/keys:ro
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      # Blocks subsequent services until service heartbeat ledger is active
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/actuator/health/readiness | grep -q UP || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - lunecare_network

  # USER INTERFACE(UI)
  frontend:
    image: ${DOCKERHUB_ACCOUNT:-ripanbaidya}/lunecare-frontend:latest
    container_name: lunecare-frontend
    ports:
      - "5173:80" # Proxies host port 5173 over to the internal server running on container port 80
    depends_on:
      # Ensures clients don't encounter dead upstream connection limits during initialization
      api-gateway:
        condition: service_healthy
    networks:
      - lunecare_network

# Shared Application Network Boundary
networks:
  lunecare_network:
    name: lunecare_network
    driver: bridge