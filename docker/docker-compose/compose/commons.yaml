services:

  # Extend this service to attach OpenTelemetry Java agent to any microservice.
  #
  # Usage — add to any service in services.yaml:
  #   extends:
  #     file: commons.yaml
  #     service: open_telemetry_environment_config
  #
  # Tempo must be running (see observability.yaml) before enabling tracing.
  open_telemetry_environment_config:
    environment:
      JAVA_TOOL_OPTIONS: "-javaagent:/app/libs/opentelemetry-javaagent-2.11.0.jar"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4318
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none