# PROD ENTRYPOINT
# Do not run this file directly.
# Use the Makefile targets:
#   make prod-up       → start everything in production mode
#   make prod-down     → stop all containers
#   make prod-logs     → tail logs from all services
#
# Manual equivalent:
#   docker compose \
#     -f ../base/infra.yml \
#     -f ../base/databases.yml \
#     -f ../base/services.yml \
#     -f infra.override.yml \
#     -f databases.override.yml \
#     -f services.override.yml \
#     --env-file ../../.env.prod \
#     up -d
# =============================================================================

