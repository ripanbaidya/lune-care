# =============================================================================
# PROD OVERLAY — Databases
# - Zero exposed ports (no external DB access in prod)
# - restart: unless-stopped
# - Resource limits per service — tune based on query load
# K8s migration: becomes StatefulSet + PVC per DB
# =============================================================================

name: lunecare

services:

  auth-db:
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M

  patient-db:
    restart: unless-stopped
