# =============================================================================
# PROD OVERLAY — Application Services
# - Only api-gateway:8080 is externally exposed (reverse proxy target)
# - restart: unless-stopped on all services
# - JVM memory tuning via JAVA_TOOL_OPTIONS
#   Uses -XX:MaxRAMPercentage instead of -Xmx for container-awareness.
#   K8s migration: these become resources.limits + env in pod spec.
# - Resource limits per service — tune per actual traffic profile
# =============================================================================

name: lunecare

services:

  config-server:
    restart: unless-stopped
    environment:
      JAVA_TOOL_OPTIONS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=70.0
        -XX:+UseG1GC
        -Djava.security.egd=file:/dev/./urandom
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 256M

  eureka-server:
