server:
  port: 8888

spring:
  application:
    name: config-server

  profiles:
    active: dev

  cloud:
    config:
      server:
        git:

          # Specifies the default branch to read configurations from
          # Falls back to 'master' if 'main' is unavailable
          default-label: main

          # Maximum time allowed fetching configuration from Git
          timeout: 10 # 10 seconds (default is 5 seconds)

          # Forces pulling the latest changes from the remote repository on each request
          force-pull: true

          # Clones the repository during application startup instead of lazy loading
          clone-on-start: true

          # Interval (in seconds) to refresh and fetch latest changes from Git
          # 0 means no periodic refresh (only fetch on demand)
          refresh-rate: 30

          # Defines locations within the repo to search for configuration files
          search-paths:
            - "." # Root directory → loads global application.yml
            - "services/{application}" # Example: services/auth
            - "infrastructure/{application}" # Example: infrastructure/api-gateway

    # Enables Spring Cloud Bus for distributed configuration management
    bus:
      enabled: true
      id: ${spring.application.name}:${server.port}

  # RabbitMQ configuration for bus-refresh
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    connection-timeout: 5000

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        # Exposes selected actuator endpoints over HTTP
        include: health, info, refresh, busrefresh, prometheus, metrics

  endpoint:
    busrefresh:
      access: unrestricted

    health:
      # Always display detailed health information (use cautiously in production)
      show-details: always
      probes:
        # Enables liveness and readiness probes (Kubernetes-friendly)
        enabled: true

    # Enables shutdown endpoint
    shutdown:
      access: unrestricted

    info:
      # Allows unrestricted access to application info endpoint
      access: unrestricted

  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true

  info:
    env:
      # Exposes environment details via /actuator/info
      enabled: true

  # Metrics configuration
  metrics:
    tags:
      application: ${spring.application.name}

# Using Spring Cloud Config Encryption so that sensitive data stays encrypted in the repository to avoid
# leaking it in plain text.
# Note: Use strong key to encrypt/decrypt the data and never expose the key in the configuration.
# Reference: https://docs.spring.io/spring-cloud-config/reference/server/encryption-and-decryption.html
encrypt:
  key: ${ENCRYPT_KEY}

info:
  app:
    name: "LuneCare Configuration Server"
    version: "v1.0.0"
    description: "Centralized configuration service powered by Spring Cloud Config, managing and distributing externalized settings across the LuneCare microservices ecosystem."