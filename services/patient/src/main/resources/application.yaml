server:
  port: 8082

spring:
  application:
    name: patient
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB
      
  datasource:
    url: jdbc:postgresql://localhost:5434/patient_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    info:
      access: unrestricted
  info:
    env:
      enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    filter: true
    show-actuator: true

app:
  integrations:
    cloudinary:
      enabled: true
      cloud-name: ${CLOUDINARY_CLOUD_NAME:dkpchjv9f}
      api-key: ${CLOUDINARY_API_KEY:697347722321417}
      api-secret: ${CLOUDINARY_API_SECRET:QJLHEzehXhW-OxCe_8C7qsyK3Sg}

info:
  app:
    name: "patient-service"
    version: "1.0.0"
    description: "API documentation for Patient Service for LuneCare Healthcare System"