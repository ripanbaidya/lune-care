server:
  port: 8086


spring:
  application:
    name: notification

  autoconfigure:
    # Disables default Spring Security user details auto-configuration
    # Useful when implementing custom authentication/authorization
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  data:
    mongodb:
      # MongoDB connection URI for notification service
      # Includes authentication database (authSource=admin)
      uri: mongodb://mongouser:mongopass@localhost:27018/notification_db?authSource=admin

  rabbitmq:
    # RabbitMQ connection configuration (message broker)
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /


management:
  endpoints:
    web:
      exposure:
        # Exposes selected actuator endpoints over HTTP
        include: health, info

  endpoint:
    health:
      # Always display detailed health information (use cautiously in production)
      show-details: always
      probes:
        # Enables liveness and readiness probes
        enabled: true

    info:
      # Allows unrestricted access to application info endpoint
      access: unrestricted

  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true

  info:
    env:
      # Exposes environment-related details via /actuator/info
      enabled: true


eureka:
  instance:
    # Registers service using IP address instead of hostname
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://localhost:8761/eureka


springdoc:
  api-docs:
    # Enables OpenAPI documentation endpoint
    enabled: true
    path: /api-docs

  swagger-ui:
    # Enables Swagger UI for interactive API exploration
    enabled: true
    path: /swagger-ui.html

    # Advanced Swagger UI configurations
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    filter: true
    show-actuator: true


rabbitmq:
  exchange:
    # Central exchange used across LuneCare services
    name: lune.care.exchange

  queues:
    # Queue for handling appointment-related events (used for triggering notifications)
    appointment-events: notification.appointment.events.queue


info:
  app:
    name: "LuneCare Notification Service"
    version: "v1.0.0"
    description: "Service responsible for processing and delivering notifications (such as appointment updates and alerts) across the LuneCare healthcare microservices ecosystem."