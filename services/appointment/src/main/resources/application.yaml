server:
  port: 8084


spring:
  application:
    name: appointment

  autoconfigure:
    # Disables default Spring Security user details auto-configuration
    # Useful when implementing custom authentication/authorization
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  cloud:
    openfeign:
      okhttp:
        # Enables OkHttp as the HTTP client for OpenFeign
        enabled: true

    # Enables Spring Cloud Bus for event-driven communication
    bus:
      enabled: true
      id: ${spring.application.name}:${server.port}

  # Enables Spring Cloud Config support
  config:
    import: "optional:configserver:http://localhost:8888"

  # Activate the dev profile by default
  profiles:
    active: dev

  flyway:
    # Enables Flyway for database schema versioning and migration
    enabled: true

    # Location of migration scripts inside the classpath
    locations: classpath:db/migration

    # Allows Flyway to baseline an existing database (useful for legacy DB integration)
    baseline-on-migrate: true

  datasource:
    # PostgreSQL database configuration for appointment service
    url: jdbc:postgresql://localhost:5436/appointment_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Validates schema against entities (does NOT modify DB structure)
      ddl-auto: validate

    # Logs SQL queries in the console (useful for debugging)
    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Formats SQL queries for better readability in logs
        format_sql: true

  data:
    redis:
      # Redis configuration for caching or distributed data handling
      host: localhost
      port: 6379
      database: 0

  # RabbitMQ connection configuration (message broker)
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    connection-timeout: 5000

management:
  endpoints:
    web:
      exposure:
        # Exposes selected actuator endpoints over HTTP
        include: health, info, refresh, busrefresh

  endpoint:
    # Allows unrestricted access to busrefresh endpoints
    busrefresh:
      access: unrestricted

    health:
      # Always display detailed health information (use cautiously in production)
      show-details: always
      probes:
        # Enables liveness and readiness probes
        enabled: true

    info:
      # Allows unrestricted access to application info endpoint
      access: unrestricted

  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true

  info:
    env:
      # Exposes environment-related details via /actuator/info
      enabled: true


eureka:
  instance:
    # Registers service using IP address instead of hostname
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://localhost:8761/eureka


springdoc:
  api-docs:
    # Enables OpenAPI documentation endpoint
    enabled: true
    path: /api-docs

  swagger-ui:
    # Enables Swagger UI for interactive API exploration
    enabled: true
    path: /swagger-ui.html

    # Advanced Swagger UI configurations
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    filter: true
    show-actuator: true


rabbitmq:
  exchange:
    # Central exchange for LuneCare messaging
    name: lune.care.exchange

  queues:
    # Queue for sending appointment-related notifications
    notification: appointment.notification.queue

    # Queue for handling payment-related events
    payment: appointment.payment.queue


app:
  appointment:
    # Time (in hours) before appointment after which cancellation is not allowed
    cancellation-cutoff-hours: 2

    # Time (in minutes) allowed to complete payment before expiration
    payment-timeout-minutes: 15


info:
  app:
    name: "LuneCare Appointment Service"
    version: "v1.0.0"
    description: "Service responsible for managing appointment scheduling, coordination, and related workflows within the LuneCare healthcare microservices ecosystem."