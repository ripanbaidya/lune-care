server:
  port: 8081

spring:
  application:
    name: auth
  autoconfigure:
    exclude:
      # Since we are not implementing the UserDetailsService interface intentionally in auth-service,
      # we need to exclude this autoconfiguration class to avoid auto generated password and user
      # and in-memory user.
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  datasource:
    url: jdbc:postgresql://localhost:5433/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      database: 0

management:
  endpoints:
    web:
      exposure:
        include: health, info
  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    info:
      access: unrestricted
  info:
    env:
      enabled: true

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

app:
  security:
    jwt:
      issuer: "LuneCare"
      header: "Authorization"
      prefix: "Bearer "
      access-token:
        expiry: ${JWT_ACCESS_TOKEN_EXPIRY:3600000} # 1h
      refresh-token:
        expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800000} # 7d
    rsa:
      algorithm: "RSA"
      private-key-path: secrets/keys/private_key.pem
      public-key-path: secrets/keys/public_key.pem

info:
  app:
    name: "auth-service"
    version: 1.0.0
    description: "Authentication and Authorization Service for LuneCare Healthcare System"
