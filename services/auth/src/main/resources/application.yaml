server:
  port: 8081


spring:
  application:
    name: auth

  autoconfigure:
    # Disables default Spring Security user details auto-configuration
    # Useful when implementing custom authentication/authorization
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  flyway:
    # Enables Flyway for database schema versioning and migration
    enabled: true

    # Location of migration scripts inside the classpath
    locations: classpath:db/migration

    # Allows Flyway to baseline an existing database (useful for legacy DB integration)
    baseline-on-migrate: true

  datasource:
    # PostgreSQL database configuration for authentication service
    url: jdbc:postgresql://localhost:5433/auth_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Validates schema against entities (does NOT modify DB structure)
      ddl-auto: validate

    # Logs SQL queries (useful during development/debugging)
    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Formats SQL output for better readability
        format_sql: true

  data:
    redis:
      # Redis configuration (used for caching, token storage, etc.)
      host: localhost
      port: 6379
      database: 0


management:
  endpoints:
    web:
      exposure:
        # Exposes selected actuator endpoints over HTTP
        include: health, info

  endpoint:
    health:
      # Always display detailed health information (use cautiously in production)
      show-details: always
      probes:
        # Enables liveness and readiness probes (useful for orchestration systems)
        enabled: true

    info:
      # Allows unrestricted access to application info endpoint
      access: unrestricted

  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true

  info:
    env:
      # Exposes environment-related details via /actuator/info
      enabled: true


eureka:
  instance:
    # Registers service using IP address instead of hostname
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://localhost:8761/eureka


springdoc:
  api-docs:
    # Enables OpenAPI documentation endpoint
    enabled: true
    path: /api-docs

  swagger-ui:
    # Enables Swagger UI for API exploration
    enabled: true
    path: /swagger-ui.html

    # Advanced Swagger UI configurations
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    filter: true
    show-actuator: true

app:
  security:
    jwt:
      # JWT issuer identifier (used for token validation)
      issuer: "LuneCare"

      # HTTP header where JWT is expected
      header: "Authorization"

      # Prefix used before the JWT in the header
      prefix: "Bearer "

      access-token:
        # Expiration time for access token (default: 1 hour)
        expiry: ${JWT_ACCESS_TOKEN_EXPIRY:3600000} # 1h

      refresh-token:
        # Expiration time for refresh token (default: 7 days)
        expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800000} # 7d

    rsa:
      # Algorithm used for JWT signing and verification
      algorithm: "RSA"

      # Path to private key (used for signing tokens)
      private-key-path: secrets/keys/private_key.pem

      # Path to public key (used for verifying tokens)
      public-key-path: secrets/keys/public_key.pem


info:
  app:
    name: "LuneCare Authentication & Authorization Service"
    version: "v1.0.0"
    description: "Core security service responsible for user authentication, authorization, and JWT-based identity management within the LuneCare healthcare microservices ecosystem."