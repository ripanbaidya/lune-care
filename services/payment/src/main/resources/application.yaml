server:
  port: 8085


spring:
  application:
    name: payment

  autoconfigure:
    # Disables default Spring Security user details auto-configuration
    # Useful when implementing custom authentication/authorization
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  cloud:
    openfeign:
      okhttp:
        # Enables OkHttp as the HTTP client for OpenFeign
        enabled: true

    # Enables Spring Cloud Stream support
    bus:
      enabled: true
      id: ${spring.application.name}:${server.port}

  # Enables Spring Cloud Config support
  config:
    import: "optional:configserver:http://localhost:8888"

  # Activate the dev profile by default
  profiles:
    active: dev

  flyway:
    # Enables Flyway for database schema versioning and migration
    enabled: true

    # Location of migration scripts inside the classpath
    locations: classpath:db/migration

    # Allows Flyway to baseline an existing database (useful for legacy DB integration)
    baseline-on-migrate: true

  datasource:
    # PostgreSQL database configuration for payment service
    url: jdbc:postgresql://localhost:5437/payment_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Validates schema against entities (does NOT modify DB structure)
      ddl-auto: validate

    # Logs SQL queries for debugging purposes
    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # Formats SQL queries for better readability
        format_sql: true

  # RabbitMQ connection configuration
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    connection-timeout: 5000

management:
  endpoints:
    web:
      exposure:
        # Exposes selected actuator endpoints over HTTP
        include: health, info, refresh, busrefresh

  endpoint:
    # Enables unrestricted access to actuator endpoints
    busrefresh:
      access: unrestricted
    health:
      # Always display detailed health information (use cautiously in production)
      show-details: always
      probes:
        # Enables liveness and readiness probes
        enabled: true

    info:
      # Allows unrestricted access to application info endpoint
      access: unrestricted

  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true

  info:
    env:
      # Exposes environment-related details via /actuator/info
      enabled: true


eureka:
  instance:
    # Registers service using IP address instead of hostname
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://localhost:8761/eureka


springdoc:
  api-docs:
    # Enables OpenAPI documentation endpoint
    enabled: true
    path: /api-docs

  swagger-ui:
    # Enables Swagger UI for interactive API exploration
    enabled: true
    path: /swagger-ui.html

    # Advanced Swagger UI configurations
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: alpha
    tags-sorter: alpha
    doc-expansion: none
    filter: true
    show-actuator: true


rabbitmq:
  exchange:
    # Central exchange used across LuneCare services
    name: lune.care.exchange

  queues:
    # Queue triggered when an appointment is cancelled (used for payment rollback/refund handling)
    appointment-cancelled: payment.appointment.cancelled.queue


app:
  payment:
    # Default currency used for transactions
    currency: INR

    gateway:
      razorpay:
        # Razorpay payment gateway configuration
        enabled: true
        key-id: ${RAZORPAY_KEY_ID}
        key-secret: ${RAZORPAY_KEY_SECRET}

      stripe:
        # Stripe payment gateway configuration
        enabled: true
        secret-key: ${STRIPE_SECRET_KEY}

        # Secret used to verify webhook events (for future integration)
        webhook-secret: ${STRIPE_WEBHOOK_SECRET}  # for future webhook endpoint


info:
  app:
    name: "LuneCare Payment Service"
    version: "v1.0.0"
    description: "Service responsible for processing payments, managing transactions, and integrating with external payment gateways within the LuneCare healthcare microservices ecosystem."