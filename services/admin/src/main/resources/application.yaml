server:
  port: 8088

spring:
  application:
    name: admin

  autoconfigure:
    # Disables default Spring Security user details autoconfiguration
    # Useful when implementing custom authentication/authorization mechanisms
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  # RabbitMQ configuration for bus-refresh
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    connection-timeout: 5000

  cloud:
    openfeign:
      okhttp:
        # Enables OkHttp as the HTTP client for OpenFeign (better performance and connection handling)
        enabled: true

    # Enables Spring Cloud Bus for distributed messaging
    bus:
      enabled: true
      id: ${spring.application.name}:${server.port}

  # Enables Spring Cloud Config support
  config:
    import: "optional:configserver:http://localhost:8888"

  # Activate the dev profile by default
  profiles:
    active: dev

management:
  endpoints:
    web:
      exposure:
        # Exposes selected actuator endpoints over HTTP
        include: health, info, refresh, busrefresh

  endpoint:
    # Allows unrestricted access to actuator endpoints
    busrefresh:
      access: unrestricted
    health:
      # Always display detailed health information (use cautiously in production)
      show-details: always
      probes:
        # Enables liveness and readiness probes (useful for container orchestration)
        enabled: true

    info:
      # Allows unrestricted access to application info endpoint
      access: unrestricted

  health:
    liveness-state:
      enabled: true
    readiness-state:
      enabled: true

  info:
    env:
      # Exposes environment-related details via /actuator/info
      enabled: true


eureka:
  instance:
    # Registers service using IP address instead of hostname
    prefer-ip-address: true

  client:
    register-with-eureka: true
    fetch-registry: true

    service-url:
      defaultZone: http://localhost:8761/eureka


springdoc:
  api-docs:
    # Enables OpenAPI documentation endpoint
    enabled: true
    path: /api-docs

  swagger-ui:
    # Enables Swagger UI for interactive API exploration
    enabled: true
    path: /swagger-ui.html


info:
  app:
    name: "LuneCare Admin Service"
    version: "v1.0.0"
    description: "Administrative service providing API documentation, monitoring interfaces, and management capabilities for the LuneCare healthcare microservices ecosystem."